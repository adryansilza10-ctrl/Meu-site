<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diagnóstico de Motores</title>

<style>
body {
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

h1 {
  color: #00aaff;
}

button {
  padding: 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.tipo {
  background: #222;
  color: white;
}

.ativo {
  background: #00aaff;
}

.resposta {
  background: #333;
  color: white;
  width: 120px;
}

#resultado {
  text-align: left;
  max-width: 400px;
  margin: auto;
}

ul {
  padding-left: 20px;
}

li {
  margin: 5px 0;
}
</style>
</head>

<body>

<h1> Diagnóstico de Falhas</h1>

<div>
  <button id="pd" class="tipo" onclick="selecionar('pd')">Partida Direta</button>
  <button id="rev" class="tipo" onclick="selecionar('rev')">Reversăo</button>
</div>

<br>

<div id="areaDiagnostico" style="display:none;">
  <h2 id="pergunta"></h2>

  <button class="resposta" onclick="responder('sim')">SIM</button>
  <button class="resposta" onclick="responder('nao')">NĂO</button>

  <br><br>
  <button onclick="iniciar()">Reiniciar</button>

  <div id="resultado"></div>
</div>

<script>
let tipoSelecionado = "";
let etapa = 0;

function selecionar(tipo) {
  tipoSelecionado = tipo;

  document.getElementById("pd").classList.remove("ativo");
  document.getElementById("rev").classList.remove("ativo");

  document.getElementById(tipo).classList.add("ativo");

  document.getElementById("areaDiagnostico").style.display = "block";

  iniciar();
}

function iniciar() {
  etapa = 1;
  document.getElementById("resultado").innerHTML = "";
  mostrarPergunta();
}

function mostrarPergunta() {

  const perguntasPD = {
    1: "Tem tensăo na entrada do disjuntor?",
    2: "O disjuntor está armado?",
    3: "Chega tensăo na bobina do contator?",
    4: "A bobina tem resistęncia?",
    5: "O contator atraca?",
    6: "O motor gira?"
  };

  const perguntasREV = {
    1: "Algum contator já está acionado?",
    2: "KM1 e KM2 estăo ligados juntos?",
    3: "O motor gira?",
    4: "Gira no sentido correto?",
    5: "A reversăo funciona?"
  };

  let pergunta = tipoSelecionado === "pd"
    ? perguntasPD[etapa]
    : perguntasREV[etapa];

  document.getElementById("pergunta").innerText = pergunta;
}

function responder(resp) {

  if (tipoSelecionado === "pd") {

    if (etapa === 1 && resp === "nao") return erro("falta_energia");
    if (etapa === 2 && resp === "nao") return erro("disjuntor");
    if (etapa === 3 && resp === "nao") return erro("comando");
    if (etapa === 4 && resp === "nao") return erro("bobina");
    if (etapa === 5 && resp === "nao") return erro("contator");
    if (etapa === 6 && resp === "nao") return erro("motor");

    if (etapa === 6 && resp === "sim") return ok();
  }

  if (tipoSelecionado === "rev") {

    if (etapa === 2 && resp === "sim") return erro("curto_km1_km2");
    if (etapa === 3 && resp === "nao") return erro("motor_nao_liga");
    if (etapa === 4 && resp === "nao") return erro("inversao_errada");
    if (etapa === 5 && resp === "nao") return erro("nao_reverte");

    if (etapa === 5 && resp === "sim") return ok();
  }

  etapa++;
  mostrarPergunta();
}

//  NOVO PADRĂO PROFISSIONAL
function erro(tipo) {

  const erros = {

    falta_energia: {
      icone: "",
      titulo: "Falta de alimentaçăo",
      passos: [
        "Verifique tensăo na entrada",
        "Confira disjuntor geral",
        "Teste com multímetro",
        "Verifique cabos soltos"
      ]
    },

    disjuntor: {
      icone: "",
      titulo: "Disjuntor desarmado",
      passos: [
        "Rearme o disjuntor",
        "Verifique curto",
        "Confirme corrente",
        "Inspecione fiaçăo"
      ]
    },

    comando: {
      icone: "",
      titulo: "Falha no comando",
      passos: [
        "Verifique botoeiras",
        "Teste contatos",
        "Confira fiaçăo",
        "Verifique selo"
      ]
    },

    bobina: {
      icone: "",
      titulo: "Bobina queimada",
      passos: [
        "Medir resistęncia",
        "Verificar tensăo",
        "Trocar contator",
        "Checar sobrecarga"
      ]
    },

    contator: {
      icone: "",
      titulo: "Contator năo aciona",
      passos: [
        "Verificar travamento",
        "Limpar contatos",
        "Testar manual",
        "Substituir se necessário"
      ]
    },

    motor: {
      icone: "",
      titulo: "Motor travado ou falta de fase",
      passos: [
        "Verificar 3 fases",
        "Medir corrente",
        "Testar continuidade",
        "Verificar eixo"
      ]
    },

    curto_km1_km2: {
      icone: "",
      titulo: "Curto entre KM1 e KM2",
      passos: [
        "Verificar intertravamento",
        "Conferir contatos",
        "Revisar comando",
        "Corrigir ligaçăo"
      ]
    },

    inversao_errada: {
      icone: "",
      titulo: "Inversăo incorreta",
      passos: [
        "Trocar duas fases",
        "Testar rotaçăo",
        "Verificar ligaçăo",
        "Confirmar esquema"
      ]
    },

    nao_reverte: {
      icone: "",
      titulo: "Motor năo reverte",
      passos: [
        "Verificar botoeira",
        "Testar contato auxiliar",
        "Conferir selo",
        "Verificar contator"
      ]
    },

    motor_nao_liga: {
      icone: "",
      titulo: "Motor năo liga",
      passos: [
        "Verificar alimentaçăo",
        "Testar disjuntor",
        "Medir tensăo",
        "Verificar comando"
      ]
    }

  };

  let e = erros[tipo];

  document.getElementById("pergunta").innerText = "Diagnóstico ";

  document.getElementById("resultado").innerHTML = `
    <div style="
      background:#111;
      padding:20px;
      border-radius:15px;
      border:2px solid #00aaff;
    ">
      <h2 style="color:#00aaff;">
        ${e.icone} ${e.titulo}
      </h2>

      <ul>
        ${e.passos.map(p => `<li> ${p}</li>`).join("")}
      </ul>
    </div>
  `;
}

function ok() {
  document.getElementById("pergunta").innerText = "Sistema funcionando ";
  document.getElementById("resultado").innerHTML = "";
}
</script>

</body>
</html>
