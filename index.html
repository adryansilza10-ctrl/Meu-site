<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Análise Técnica SENAI Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        :root {
            --neon-blue: #00aaff;
            --neon-red: #ff4444;
            --bg-dark: #080808;
            --card-bg: #121212;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            min-height: 100vh;
        }

        /* Container Principal */
        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #222;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            margin-top: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            font-size: 1.4rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.4);
        }

        /* Estilo dos Botões Principais */
        .btn {
            width: 100%;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        /* Botões de Ação (SIM/NÃO) */
        .btn-action {
            width: 46%;
            display: inline-block;
            margin: 5px 1%;
            font-size: 1.1rem;
            border: none;
            font-weight: bold;
        }
        
        .btn-sim { background-color: #28a745; color: white; }
        .btn-nao { background-color: #dc3545; color: white; }

        /* Card de Resultado */
        .result-card {
            background: #000;
            border-left: 5px solid var(--neon-red);
            padding: 20px;
            text-align: left;
            margin-top: 15px;
            border-radius: 8px;
        }

        .result-card h3 { color: var(--neon-red); font-family: 'Orbitron'; margin-top: 0; }

        /* Container do Diagrama Mermaid */
        .mermaid-container {
            background: white; /* Fundo branco ajuda a ler o diagrama no celular */
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        /* Texto da Pergunta */
        #texto-pergunta {
            font-size: 1.2rem;
            margin: 35px 0;
            min-height: 50px;
            font-weight: bold;
            color: #fff;
        }

        /* Botão de Reset */
        .btn-reset {
            background: none;
            border: none;
            color: var(--neon-blue);
            text-decoration: underline;
            margin-top: 25px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* 1. ESTILO DA IMAGEM FIXA NO FINAL (Invertida) */
        .footer-logo {
            margin-top: 40px;
            text-align: center;
            padding-bottom: 20px;
        }
        .footer-logo img {
            width: 130px; /* Tamanho ajustado */
            height: auto;
            /* 2. MÁGICA: Inverte as cores (preto vira branco) */
            filter: invert(1); 
            opacity: 0.7; /* Um pouco transparente para não gritar na tela */
        }
    </style>
</head>
<body class="notranslate">

<div class="dashboard">
    <h1>Análise de Motores</h1>

    <div id="tela-selecao">
        <p style="margin-bottom: 20px; color: var(--neon-blue); font-size: 0.9rem;">Selecione o tipo de partida:</p>
        <button class="btn" onclick="iniciar('pd')">Partida Direta</button>
        <button class="btn" onclick="iniciar('rev')">Reversão</button>
    </div>

    <div id="tela-perguntas" style="display:none;">
        <div id="texto-pergunta"></div>
        <button class="btn btn-action btn-sim" onclick="resposta('sim')">SIM</button>
        <button class="btn btn-action btn-nao" onclick="resposta('nao')">NÃO</button>
        <br>
        <button class="btn-reset" onclick="voltar()">← Voltar ao início</button>
    </div>

    <div id="tela-resultado" style="display:none;">
        <div id="conteudo-resultado"></div>
        <button class="btn" style="margin-top:20px; border-color:var(--neon-blue)" onclick="voltar()">Nova Análise</button>
    </div>
</div>

<div class="footer-logo">
    <img src="Https://i.postimg.cc/9QXXrbn4/images-(9).jpg" alt="Logo">
</div>

<script>
    // Configuração do Mermaid (Usando tema claro para o diagrama aparecer no fundo branco)
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    let tipoPartida = "";
    let etapa = 0;

    // BANCO DE PERGUNTAS (Sem o erro 'undefined')
    const perguntas = {
        pd: [
            "O disjuntor geral tem tensão na entrada (L1/L2/L3)?",
            "O motor gira livremente com a mão?",
            "Os contatos do contator fecham ao pulsar o botão liga?"
        ],
        rev: [
            "O intertravamento elétrico está impedindo acionamento duplo?",
            "O motor inverte o sentido de rotação?",
            "A tensão chega nas 3 fases do motor nos dois sentidos?"
        ]
    };

    function iniciar(t) {
        tipoPartida = t;
        etapa = 0;
        document.getElementById('tela-selecao').style.display = 'none';
        document.getElementById('tela-perguntas').style.display = 'block';
        atualizarTexto();
    }

    function atualizarTexto() {
        // Correção para não dar erro se a etapa passar do limite
        if (etapa < perguntas[tipoPartida].length) {
            document.getElementById('texto-pergunta').innerText = perguntas[tipoPartida][etapa];
        } else {
            sucesso();
        }
    }

    function resposta(r) {
        if (tipoPartida === 'pd') {
            if (etapa === 0 && r === 'nao') return fim("FALHA DE ENERGIA", "graph TD\nA[Entrada] --> B{Disjuntor Geral}\nB -->|OFF| C[Ligar Disjuntor]\nB -->|ON| D[Checar Fusíveis]");
            if (etapa === 1 && r === 'nao') return fim("FALHA MECÂNICA", "graph TD\nA[Eixo Travado] --> B[Lubrificar/Trocar Rolamentos]");
            if (etapa === 2 && r === 'nao') return fim("FALHA NO COMANDO", "graph TD\nA[Bobina] --> B{Tem Tensão?}\nB -->|Não| C[Checar Botoeira/Emergência]");
            if (etapa === 2 && r === 'sim') return sucesso();
        } else {
            if (etapa === 0 && r === 'nao') return fim("ERRO DE TRAVAMENTO", "graph LR\nK1 ---|CURTO| K2\nK2 -->|CORREÇÃO| I[Revisar Contatos Auxiliares]");
            if (etapa === 1 && r === 'nao') return fim("ERRO DE FASES", "graph TD\nA[Motor não inverte] --> B[Inverter L1 e L3 no KM2]\nB --> C[Testar Novamente]");
            if (etapa === 2 && r === 'nao') return fim("FALHA DE SAÍDA", "graph TD\nA[Falta de Fase] --> B[Medir Multímetro]\nB --> C[Revisar Fiação Potência]");
            if (etapa === 2 && r === 'sim') return sucesso();
        }
        
        etapa++;
        atualizarTexto();
    }

    function fim(titulo, code) {
        document.getElementById('tela-perguntas').style.display = 'none';
        document.getElementById('tela-resultado').style.display = 'block';
        
        document.getElementById('conteudo-resultado').innerHTML = `
            <div class="result-card">
                <h3>⚠ ${titulo}</h3>
                <p>Siga o diagrama abaixo para resolver:</p>
                <div class="mermaid-container"><div class="mermaid">${code}</div></div>
            </div>`;
        
        // Renderizar o diagrama Mermaid
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
    }

    function sucesso() {
        document.getElementById('tela-perguntas').style.display = 'none';
        document.getElementById('tela-resultado').style.display = 'block';
        document.getElementById('conteudo-resultado').innerHTML = `
            <div class="result-card" style="border-color:#28a745">
                <h3 style="color:#28a745">✓ SISTEMA OK</h3>
                <p>O circuito passou nos testes básicos de rastreamento.</p>
            </div>`;
    }

    function voltar() {
        tipoPartida = "";
        etapa = 0;
        document.getElementById('tela-resultado').style.display = 'none';
        document.getElementById('tela-perguntas').style.display = 'none';
        document.getElementById('tela-selecao').style.display = 'block';
    }
</script>
</body>
</html>
